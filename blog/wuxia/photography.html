<!DOCTYPE html>
<html lang="zh-CN" data-theme="wuxia">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光影江湖 — 张单单的技术江湖</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink:         #1a1410;
  --ink-soft:    #3a3028;
  --ink-light:   #6b5e50;
  --paper:       #faf7f0;
  --bg:          #ede8db;
  --accent:      #c43a31;
  --accent-dark: #8b1a12;
  --accent-soft: #fdf2f0;
  --gold:        #b8943e;
  --gold-light:  #d4b860;
  --warm-gray:   #f5efe0;
  --border:      #d9ceb8;
  --muted:       #6b5e4f;
  --shadow:      0 4px 32px rgba(100,60,20,0.08);
  --content-w:   900px;
  --font-heading: "Noto Serif SC", "KaiTi", "STKaiti", "楷体", "Songti SC", serif;
  --font-body:    "Noto Serif SC", "PingFang SC", "KaiTi", "STKaiti", sans-serif;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  font-size: 16px; line-height: 1.85;
  color: var(--ink); background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 0%, rgba(200,170,120,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 100%, rgba(180,140,80,0.04) 0%, transparent 50%);
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
}

/* Nav */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,247,240,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.nav-inner {
  max-width: var(--content-w); margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.nav-logo {
  font-family: var(--font-heading); font-size: 18px; font-weight: 700;
  letter-spacing: 2px; color: var(--accent); text-decoration: none;
  display: flex; align-items: center; gap: 8px;
}
.nav-logo::before { content: ""; display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.nav-links { display: flex; gap: 24px; list-style: none; }
.nav-links a {
  font-size: 13px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--muted); text-decoration: none; transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--accent); }

/* Page header */
.page-hd {
  max-width: var(--content-w); margin: 0 auto;
  padding: 64px 40px 40px;
  position: relative; z-index: 1;
}
.page-hd .back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--muted); text-decoration: none;
  margin-bottom: 24px; transition: color 0.2s;
}
.page-hd .back-link:hover { color: var(--accent); }
.page-hd .back-link::before { content: "←"; font-size: 14px; }
.page-hd h1 {
  font-family: var(--font-heading);
  font-size: clamp(32px, 5vw, 44px); font-weight: 700;
  color: var(--ink); letter-spacing: -0.5px;
  margin-bottom: 8px;
}
.page-hd .hd-sub {
  font-size: 14px; color: var(--muted);
  letter-spacing: 1px;
}

/* Photo grid */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  max-width: var(--content-w);
  margin: 0 auto;
  padding: 0 40px 80px;
}
.photo-item {
  position: relative; overflow: hidden;
  border: 1px solid var(--border);
  background: var(--paper);
  aspect-ratio: 4 / 3;
  cursor: pointer;
}
.photo-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.4s, filter 0.4s;
  filter: sepia(0.15);
}
.photo-item:hover img {
  transform: scale(1.06);
  filter: sepia(0);
}
.photo-item .photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(26,20,16,0.65) 0%, transparent 55%);
  display: flex; align-items: flex-end;
  padding: 16px;
  opacity: 0; transition: opacity 0.3s;
}
.photo-item:hover .photo-overlay { opacity: 1; }
.photo-item .photo-caption {
  color: #faf7f0; font-size: 13px;
  font-family: var(--font-heading);
  letter-spacing: 1px; font-weight: 600;
}

/* Footer（共享页脚：CSS 定义于此，HTML 由 _includes/footer_article.html 注入）*/
.wuxia-divider {
  text-align: center; padding: 0 0 16px;
  color: var(--accent); opacity: 0.25; font-size: 20px; letter-spacing: 16px; user-select: none;
}
.footer {
  background: var(--ink);
  padding: 56px 72px 48px;
  color: #b0aca4;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 48px;
}
.footer .footer-left { min-width: 0; }
.footer .refs-label {
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: #5c5850;
  margin-bottom: 18px; display: block;
}
.footer .refs {
  list-style: none; margin-bottom: 36px;
}
.footer .refs li {
  font-size: 12px; line-height: 2; color: #7a756b;
  padding-left: 18px; position: relative; margin-bottom: 4px;
  word-break: break-all;
}
.footer .refs li::before {
  content: "[·]"; position: absolute; left: 0;
  color: #4a4540; font-size: 10px;
}
.footer .refs li a { color: #7a756b; text-decoration: none; transition: color 0.2s; }
.footer .refs li a:hover { color: var(--gold-light); }
.footer .sig-line {
  width: 40px; height: 2px; background: #3a3530; margin-bottom: 20px;
}
.footer .sig-name {
  font-family: var(--font-heading); font-size: 22px; font-weight: 700;
  color: var(--paper); letter-spacing: 2px; margin-bottom: 4px;
}
.footer .sig-sub {
  font-size: 11px; letter-spacing: 1px; color: #5c5850;
}
.footer .footer-right {
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end; gap: 10px;
}
.footer .qrcode-img {
  width: 90px; height: 90px; border-radius: 6px;
  opacity: 0.88; border: 1px solid rgba(180,180,170,0.15); display: block;
}
.footer .qrcode-hint {
  font-size: 10px; letter-spacing: 1.5px; color: #5c5850;
}

/* Responsive */
@media (max-width: 900px) {
  .photo-grid { grid-template-columns: repeat(2, 1fr); padding: 0 24px 56px; }
}
@media (max-width: 480px) {
  .page-hd { padding: 40px 16px 32px; }
  .photo-grid { grid-template-columns: 1fr; padding: 0 16px 48px; }
  .nav-links { gap: 12px; font-size: 11px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">张单单 · 技术江湖</a>
    <ul class="nav-links">
      <li><a href="../index.html#about">关于</a></li>
      <li><a href="../index.html#skills">技艺</a></li>
      <li><a href="../index.html#gallery">图录</a></li>
      <li><a href="articles.html">文章</a></li>
      <li><a href="reading-notes.html">读书笔记</a></li>
      <li><a href="photography.html" class="active">摄影</a></li>
      <li><a href="../index.html#contact">联系</a></li>
    </ul>
  </div>
</nav>

<header class="page-hd">
  <a href="../index.html" class="back-link">返回江湖</a>
  <h1>光影江湖</h1>
  <p class="hd-sub">一镜一世界，一影一江湖 · 以快门封印刹那光阴</p>
</header>

<div class="wuxia-divider">◆ ◇ ◆ ◇ ◆</div>

<main class="photo-grid" id="photoGrid">
  <!-- 由 JS 动态加载 photo_manifest.json -->
</main>

<div class="wuxia-divider">◆ ◇ ◆ ◇ ◆</div>

<div class="footer">
  <div class="footer-left">
    <span class="refs-label">光影驿站</span>
    <ul class="refs">
      <li><a href="../index.html">← 返回江湖</a></li>
      <li><a href="articles.html">全部文章</a></li>
      <li><a href="reading-notes.html">读书笔记</a></li>
    </ul>
    <div class="sig-line"></div>
    <div class="sig-name">daner技术栈</div>
    <div class="sig-sub">Tech Knowledge Card · Web Edition · Multi-source verified</div>
  </div>
  <div class="footer-right">
    <img src="../qrcode_wechat.jpg" alt="关注公众号 daner技术栈" class="qrcode-img" />
    <span class="qrcode-hint">扫码关注</span>
  </div>
</div>

<script>
(async () => {
  const grid = document.getElementById('photoGrid');
  if (!grid) return;

  const manifestURL = '../images/photo_organized/photo_manifest.json';
  const imageBase  = '../images/photo_organized/';

  try {
    const resp = await fetch(manifestURL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const images = data.images || [];

    if (images.length === 0) {
      grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--muted);padding:48px 0;">暂无照片</p>';
      return;
    }

    let html = '';
    for (const img of images) {
      const src = imageBase + img.file;
      const label = img.label || '';
      html += `
        <div class="photo-item">
          <img src="${src}" alt="${label}" loading="lazy">
          <div class="photo-overlay"><span class="photo-caption">${label}</span></div>
        </div>`;
    }
    grid.innerHTML = html;
  } catch (err) {
    grid.innerHTML =
      '<p style="grid-column:1/-1;text-align:center;color:var(--muted);padding:48px 0;">图录加载失败，请稍后再试</p>';
    console.error('photo_manifest fetch failed:', err);
  }
})();
</script>

</body>
</html>
