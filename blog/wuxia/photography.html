<!DOCTYPE html>
<html lang="zh-CN" data-theme="wuxia">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光影江湖 — 张单单的技术江湖</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink:         #1a1410;
  --ink-soft:    #3a3028;
  --ink-light:   #6b5e50;
  --paper:       #faf7f0;
  --bg:          #ede8db;
  --accent:      #c43a31;
  --accent-dark: #8b1a12;
  --accent-soft: #fdf2f0;
  --gold:        #b8943e;
  --gold-light:  #d4b860;
  --warm-gray:   #f5efe0;
  --border:      #d9ceb8;
  --muted:       #6b5e4f;
  --shadow:      0 4px 32px rgba(100,60,20,0.08);
  --content-w:   900px;
  --font-heading: "Noto Serif SC", "KaiTi", "STKaiti", "楷体", "Songti SC", serif;
  --font-body:    "Noto Serif SC", "PingFang SC", "KaiTi", "STKaiti", sans-serif;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  font-size: 16px; line-height: 1.85;
  color: var(--ink); background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 0%, rgba(200,170,120,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 100%, rgba(180,140,80,0.04) 0%, transparent 50%);
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
}

/* Nav */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,247,240,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.nav-inner {
  max-width: var(--content-w); margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.nav-logo {
  font-family: var(--font-heading); font-size: 18px; font-weight: 700;
  letter-spacing: 2px; color: var(--accent); text-decoration: none;
  display: flex; align-items: center; gap: 8px;
}
.nav-logo::before { content: ""; display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.nav-links { display: flex; gap: 24px; list-style: none; }
.nav-links a {
  font-size: 13px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--muted); text-decoration: none; transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--accent); }

/* Page header */
.page-hd {
  max-width: var(--content-w); margin: 0 auto;
  padding: 64px 40px 40px;
  position: relative; z-index: 1;
}
.page-hd .back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--muted); text-decoration: none;
  margin-bottom: 24px; transition: color 0.2s;
}
.page-hd .back-link:hover { color: var(--accent); }
.page-hd .back-link::before { content: "←"; font-size: 14px; }
.page-hd h1 {
  font-family: var(--font-heading);
  font-size: clamp(32px, 5vw, 44px); font-weight: 700;
  color: var(--ink); letter-spacing: -0.5px;
  margin-bottom: 8px;
}
.page-hd .hd-sub {
  font-size: 14px; color: var(--muted);
  letter-spacing: 1px;
}

/* Photo gallery — 自适应画廊（masonry 瀑布流，保留图片真实比例）*/
.photo-grid {
  column-count: 3;
  column-gap: 22px;
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 40px 88px;
}
.photo-item {
  position: relative;
  break-inside: avoid;
  margin: 0 0 22px;
  border-radius: 5px;
  overflow: hidden;
  background: var(--paper);
  border: 1px solid rgba(217,206,184,0.6);
  box-shadow: var(--shadow);
  cursor: zoom-in;
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.7s ease, transform 0.7s ease, box-shadow 0.4s ease;
}
.photo-item.is-in { opacity: 1; transform: none; }
.photo-item img {
  width: 100%; height: auto; display: block;
  transition: transform 0.7s cubic-bezier(0.2,0.7,0.2,1), filter 0.6s ease;
  filter: sepia(0.12) saturate(1.02);
}
.photo-item:hover {
  box-shadow: 0 14px 44px rgba(100,60,20,0.20);
}
.photo-item:hover img {
  transform: scale(1.045);
  filter: sepia(0) saturate(1.05);
}
.photo-item .photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(26,20,16,0.72) 0%, transparent 52%);
  display: flex; align-items: flex-end;
  padding: 14px 16px;
  opacity: 0; transition: opacity 0.35s ease;
  pointer-events: none;
}
.photo-item:hover .photo-overlay { opacity: 1; }
.photo-item .photo-caption {
  color: #faf7f0; font-size: 13px;
  font-family: var(--font-heading);
  letter-spacing: 1px; font-weight: 600;
  text-shadow: 0 1px 5px rgba(0,0,0,0.45);
}

/* Lightbox — 高级暗色灯箱 */
.lightbox {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(18,14,10,0.94);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
  padding: 56px;
  opacity: 0; visibility: hidden;
  transition: opacity 0.3s ease, visibility 0.3s ease;
  cursor: zoom-out;
}
.lightbox.open { opacity: 1; visibility: visible; }
.lightbox img {
  max-width: 90vw; max-height: 78vh; object-fit: contain;
  border-radius: 4px;
  box-shadow: 0 24px 70px rgba(0,0,0,0.55);
  transform: scale(0.96); transition: transform 0.3s ease;
}
.lightbox.open img { transform: scale(1); }
.lightbox .lb-caption {
  color: #ece6d9; font-family: var(--font-heading);
  font-size: 15px; letter-spacing: 2px;
  text-shadow: 0 1px 6px rgba(0,0,0,0.5);
}
.lightbox .lb-close {
  position: absolute; top: 22px; right: 30px;
  color: #ece6d9; font-size: 32px; line-height: 1;
  cursor: pointer; opacity: 0.65; transition: opacity 0.2s ease; user-select: none;
}
.lightbox .lb-close:hover { opacity: 1; }
.lightbox .lb-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  color: #ece6d9; font-size: 46px; line-height: 1;
  cursor: pointer; opacity: 0.5; user-select: none;
  padding: 0 20px; transition: opacity 0.2s ease;
}
.lightbox .lb-nav:hover { opacity: 1; }
.lightbox .lb-prev { left: 6px; }
.lightbox .lb-next { right: 6px; }

/* Footer（共享页脚：CSS 定义于此，HTML 由 _includes/footer_article.html 注入）*/
.wuxia-divider {
  text-align: center; padding: 0 0 16px;
  color: var(--accent); opacity: 0.25; font-size: 20px; letter-spacing: 16px; user-select: none;
}
.footer {
  background: var(--ink);
  padding: 56px 72px 48px;
  color: #b0aca4;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 48px;
}
.footer .footer-left { min-width: 0; }
.footer .refs-label {
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: #5c5850;
  margin-bottom: 18px; display: block;
}
.footer .refs {
  list-style: none; margin-bottom: 36px;
}
.footer .refs li {
  font-size: 12px; line-height: 2; color: #7a756b;
  padding-left: 18px; position: relative; margin-bottom: 4px;
  word-break: break-all;
}
.footer .refs li::before {
  content: "[·]"; position: absolute; left: 0;
  color: #4a4540; font-size: 10px;
}
.footer .refs li a { color: #7a756b; text-decoration: none; transition: color 0.2s; }
.footer .refs li a:hover { color: var(--gold-light); }
.footer .sig-line {
  width: 40px; height: 2px; background: #3a3530; margin-bottom: 20px;
}
.footer .sig-name {
  font-family: var(--font-heading); font-size: 22px; font-weight: 700;
  color: var(--paper); letter-spacing: 2px; margin-bottom: 4px;
}
.footer .sig-sub {
  font-size: 11px; letter-spacing: 1px; color: #5c5850;
}
.footer .footer-right {
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end; gap: 10px;
}
.footer .qrcode-img {
  width: 90px; height: 90px; border-radius: 6px;
  opacity: 0.88; border: 1px solid rgba(180,180,170,0.15); display: block;
}
.footer .qrcode-hint {
  font-size: 10px; letter-spacing: 1.5px; color: #5c5850;
}

/* Responsive */
@media (max-width: 900px) {
  .photo-grid { column-count: 2; padding: 0 24px 56px; }
}
@media (max-width: 480px) {
  .page-hd { padding: 40px 16px 32px; }
  .photo-grid { column-count: 1; padding: 0 16px 48px; }
  .nav-links { gap: 12px; font-size: 11px; }
  .lightbox { padding: 24px; }
  .lightbox .lb-nav { font-size: 34px; padding: 0 8px; }
}
</style>
</head>
<body>

<div id="siteNav"></div>
<script src="nav.js"></script>

<header class="page-hd">
  <a href="../index.html" class="back-link">返回江湖</a>
  <h1>光影江湖</h1>
  <p class="hd-sub">一镜一世界，一影一江湖 · 以快门封印刹那光阴</p>
</header>

<div class="wuxia-divider">◆ ◇ ◆ ◇ ◆</div>

<main class="photo-grid" id="photoGrid">
  <!-- 由 JS 动态加载 photo_manifest.json -->
</main>

<div class="wuxia-divider">◆ ◇ ◆ ◇ ◆</div>

<footer id="siteFooter"></footer>
<script src="footer.js"></script>

<script>
(async () => {
  const grid = document.getElementById('photoGrid');
  if (!grid) return;

  const manifestURL = '../images/photo_organized/photo_manifest.json';
  const imageBase  = '../images/photo_organized/';

  try {
    const resp = await fetch(manifestURL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const images = data.images || [];

    if (images.length === 0) {
      grid.innerHTML = '<p style="text-align:center;color:var(--muted);padding:48px 0;">暂无照片</p>';
      return;
    }

    const items = images.map(img => ({
      src: imageBase + img.file,
      label: img.label || ''
    }));

    grid.innerHTML = items.map((it, i) => `
      <figure class="photo-item" data-index="${i}">
        <img src="${it.src}" alt="${it.label}" loading="lazy">
        <figcaption class="photo-overlay"><span class="photo-caption">${it.label}</span></figcaption>
      </figure>`).join('');

    // 入场淡入（不支持时直接显示）
    const cards = grid.querySelectorAll('.photo-item');
    if ('IntersectionObserver' in window) {
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('is-in'); io.unobserve(e.target); }
        });
      }, { rootMargin: '0px 0px -40px 0px' });
      cards.forEach(el => io.observe(el));
    } else {
      cards.forEach(el => el.classList.add('is-in'));
    }

    initLightbox(items);
  } catch (err) {
    grid.innerHTML =
      '<p style="text-align:center;color:var(--muted);padding:48px 0;">图录加载失败，请稍后再试</p>';
    console.error('photo_manifest fetch failed:', err);
  }

  function initLightbox(items) {
    const lb = document.createElement('div');
    lb.className = 'lightbox';
    lb.innerHTML =
      '<span class="lb-close" title="关闭">&times;</span>' +
      '<span class="lb-nav lb-prev" title="上一张">&#8249;</span>' +
      '<img alt="">' +
      '<span class="lb-caption"></span>' +
      '<span class="lb-nav lb-next" title="下一张">&#8250;</span>';
    document.body.appendChild(lb);

    const lbImg = lb.querySelector('img');
    const lbCap = lb.querySelector('.lb-caption');
    let idx = 0;

    const show = (i) => {
      idx = (i + items.length) % items.length;
      lbImg.src = items[idx].src;
      lbCap.textContent = items[idx].label;
    };
    const open  = (i) => { show(i); lb.classList.add('open'); document.body.style.overflow = 'hidden'; };
    const close = () => { lb.classList.remove('open'); document.body.style.overflow = ''; };

    grid.addEventListener('click', (e) => {
      const item = e.target.closest('.photo-item');
      if (item) open(Number(item.dataset.index));
    });
    lb.addEventListener('click', (e) => {
      if (e.target === lb || e.target.classList.contains('lb-close')) close();
      else if (e.target.classList.contains('lb-prev')) show(idx - 1);
      else if (e.target.classList.contains('lb-next')) show(idx + 1);
    });
    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') close();
      else if (e.key === 'ArrowLeft') show(idx - 1);
      else if (e.key === 'ArrowRight') show(idx + 1);
    });
  }
})();
</script>

</body>
</html>
