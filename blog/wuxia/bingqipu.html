<!DOCTYPE html>
<html lang="zh-CN" data-theme="wuxia">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兵器谱 · 编程路线图 — 张单单的技术江湖</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink:         #1a1410;
  --ink-soft:    #3a3028;
  --ink-light:   #6b5e50;
  --paper:       #faf7f0;
  --bg:          #ede8db;
  --accent:      #c43a31;
  --accent-dark: #8b1a12;
  --accent-soft: #fdf2f0;
  --gold:        #b8943e;
  --gold-light:  #d4b860;
  --warm-gray:   #f5efe0;
  --border:      #d9ceb8;
  --muted:       #6b5e4f;
  --shadow:      0 4px 32px rgba(100,60,20,0.08);
  --content-w:   1080px;
  --font-heading: "Noto Serif SC", "KaiTi", "STKaiti", "楷体", "Songti SC", serif;
  --font-body:    "Noto Serif SC", "PingFang SC", "KaiTi", "STKaiti", sans-serif;
}

/* Nav */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,247,240,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.nav-inner {
  max-width: var(--content-w); margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.nav-logo {
  font-family: var(--font-heading); font-size: 18px; font-weight: 700;
  letter-spacing: 2px; color: var(--accent); text-decoration: none;
  display: flex; align-items: center; gap: 8px;
}
.nav-logo::before { content: ""; display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.nav-links { display: flex; gap: 22px; list-style: none; }
.nav-links a {
  font-size: 13px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--muted); text-decoration: none; transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--accent); }

/* Page header */
.page-hd {
  max-width: var(--content-w); margin: 0 auto;
  padding: 64px 40px 28px; position: relative; z-index: 1;
}
.page-hd .back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--muted); text-decoration: none; margin-bottom: 24px; transition: color 0.2s;
}
.page-hd .back-link:hover { color: var(--accent); }
.page-hd .back-link::before { content: "←"; font-size: 14px; }
.page-hd h1 {
  font-family: var(--font-heading);
  font-size: clamp(32px, 5vw, 44px); font-weight: 700;
  color: var(--ink); letter-spacing: -0.5px; margin-bottom: 8px;
}
.page-hd .hd-sub { font-size: 14px; color: var(--muted); letter-spacing: 1px; }
.page-hd .hd-intro {
  max-width: 760px; margin-top: 20px;
  font-size: 14px; line-height: 1.95; color: var(--ink-soft);
  padding: 18px 20px; background: var(--paper);
  border: 1px solid var(--border); border-left: 3px solid var(--gold);
  border-radius: 2px;
}

.wuxia-divider {
  text-align: center; padding: 8px 0 24px;
  color: var(--accent); opacity: 0.25; font-size: 20px; letter-spacing: 16px; user-select: none;
}

/* ===== 双栏布局：左路线 / 右书籍 ===== */
.bingqi-layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 48px;
  max-width: var(--content-w);
  margin: 0 auto;
  padding: 0 40px 80px;
  position: relative; z-index: 1;
}

/* 左侧：编程路线（竖向路标） */
.roadmap-col .roadmap-title {
  font-family: var(--font-heading);
  font-size: 15px; font-weight: 700; letter-spacing: 3px;
  color: var(--accent); margin-bottom: 22px; padding-left: 4px;
}
.roadmap {
  position: relative;
  padding-left: 26px;
  border-left: 2px solid var(--border);
}
.roadmap-node {
  position: relative;
  padding: 0 0 26px 22px;
  cursor: pointer;
}
.roadmap-node::before {
  content: "";
  position: absolute; left: -33px; top: 4px;
  width: 15px; height: 15px; border-radius: 50%;
  background: var(--paper); border: 3px solid var(--border);
  box-shadow: 0 0 0 3px var(--paper);
  transition: all 0.2s;
}
.roadmap-node:last-child { padding-bottom: 4px; }
.roadmap-node.active::before { border-color: var(--accent); background: var(--accent); }
.roadmap-node .rn-name {
  font-family: var(--font-heading);
  font-size: 17px; font-weight: 700; color: var(--ink);
  letter-spacing: 1px; transition: color 0.2s;
}
.roadmap-node.active .rn-name { color: var(--accent); }
.roadmap-node:hover .rn-name { color: var(--accent); }
.roadmap-node .rn-desc {
  font-size: 12.5px; color: var(--muted); margin-top: 5px; line-height: 1.7;
}

/* 右侧：书籍面板 */
.book-panel-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 16px; flex-wrap: wrap; margin-bottom: 22px;
  padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.book-panel-head h2 {
  font-family: var(--font-heading); font-size: 24px; font-weight: 700; color: var(--ink);
}
.book-panel-head .bp-desc { font-size: 13px; color: var(--muted); }
.book-panel-head .bp-count { font-size: 12px; color: var(--muted); letter-spacing: 1px; white-space: nowrap; }

/* Book grid（复用藏书阁卡片样式） */
.book-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 22px;
}
.book-card {
  position: relative;
  display: flex; gap: 16px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
}
.book-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--gold); }
.book-cover {
  flex: 0 0 76px;
  width: 76px; height: 108px;
  border-radius: 6px;
  background: linear-gradient(135deg, var(--ink-soft), var(--ink));
  color: var(--gold-light);
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  font-family: var(--font-heading);
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  padding: 8px; line-height: 1.4;
  box-shadow: inset 0 0 0 1px rgba(184,148,62,0.25);
  overflow: hidden;
}
.book-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
.book-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.book-title {
  font-family: var(--font-heading); font-size: 16px; font-weight: 700;
  color: var(--ink); line-height: 1.35; margin-bottom: 2px;
}
.book-author { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.book-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.book-rating { color: var(--gold); font-size: 13px; letter-spacing: 1px; }
.book-rating .star-off { color: var(--border); }
.book-status {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  padding: 2px 8px; border-radius: 999px;
}
.status-read    { background: rgba(34,197,94,0.12);  color: #2f8a4a; }
.status-reading { background: rgba(59,130,246,0.12);  color: #2f6bd0; }
.status-wish    { background: rgba(180,148,62,0.14);  color: #9a7a26; }
.book-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
.book-tag {
  font-size: 11px; color: var(--ink-light);
  background: var(--warm-gray); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 7px; letter-spacing: 0.5px;
}
.book-cat {
  position: absolute; top: -1px; right: -1px;
  font-size: 10px; letter-spacing: 1px; color: #fff;
  background: var(--accent-dark); padding: 3px 10px; border-radius: 0 10px 0 10px;
}

/* Detail panel */
.detail-mask {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(26,20,16,0.45);
  backdrop-filter: blur(3px);
  display: none; align-items: center; justify-content: center; padding: 24px;
}
.detail-mask.open { display: flex; }
.detail-panel {
  background: var(--paper); max-width: 560px; width: 100%;
  border-radius: 14px; padding: 32px;
  position: relative; box-shadow: var(--shadow);
  animation: pop 0.25s ease;
}
@keyframes pop { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
.detail-close {
  position: absolute; top: 16px; right: 18px;
  font-size: 22px; line-height: 1; color: var(--muted); cursor: pointer;
  background: none; border: none;
}
.detail-close:hover { color: var(--accent); }
.detail-panel h2 { font-family: var(--font-heading); font-size: 24px; margin-bottom: 4px; color: var(--ink); }
.detail-panel .d-author { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.detail-panel .d-row { display: flex; gap: 14px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.detail-panel .d-summary { font-size: 14px; line-height: 1.9; color: var(--ink-soft); margin-bottom: 20px; }
.detail-panel .d-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; letter-spacing: 1px;
  color: #fff; background: var(--accent);
  text-decoration: none; padding: 8px 18px; border-radius: 8px; transition: background 0.2s;
}
.detail-panel .d-link:hover { background: var(--accent-dark); }

/* Footer */
.footer-full {
  background: var(--ink);
  padding: 56px 72px 48px;
  color: #b0aca4;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 48px;
}
.footer-full .footer-left { min-width: 0; }
.footer-full .refs-label {
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: #5c5850;
  margin-bottom: 18px; display: block;
}
.footer-full .refs { list-style: none; margin-bottom: 36px; }
.footer-full .refs li {
  font-size: 12px; line-height: 2; color: #7a756b;
  padding-left: 18px; position: relative; margin-bottom: 4px;
  word-break: break-all;
}
.footer-full .refs li::before { content: "[·]"; position: absolute; left: 0; color: #4a4540; font-size: 10px; }
.footer-full .refs li a { color: #7a756b; text-decoration: none; transition: color 0.2s; }
.footer-full .refs li a:hover { color: var(--gold-light); }
.footer-full .sig-line { width: 40px; height: 2px; background: #3a3530; margin-bottom: 20px; }
.footer-full .sig-name { font-family: var(--font-heading); font-size: 22px; font-weight: 700; color: var(--paper); letter-spacing: 2px; margin-bottom: 4px; }
.footer-full .sig-sub { font-size: 11px; letter-spacing: 1px; color: #5c5850; }
.footer-full .footer-right { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 10px; }
.footer-full .qrcode-img { width: 90px; height: 90px; border-radius: 6px; opacity: 0.88; border: 1px solid rgba(180,180,170,0.15); display: block; }
.footer-full .qrcode-hint { font-size: 10px; letter-spacing: 1.5px; color: #5c5850; }

/* Responsive */
@media (max-width: 900px) {
  .bingqi-layout { grid-template-columns: 1fr; gap: 28px; padding: 0 24px 64px; }
  .roadmap { padding-left: 22px; }
  .book-grid { grid-template-columns: 1fr; }
  .page-hd { padding: 40px 24px 24px; }
  .nav-links { gap: 12px; font-size: 11px; }
}
@media (max-width: 480px) {
  .footer-full { padding: 40px 24px; grid-template-columns: 1fr; }
  .footer-full .footer-right { flex-direction: row; justify-content: flex-start; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">张单单 · 技术江湖</a>
    <ul class="nav-links">
      <li><a href="../index.html#about">关于</a></li>
      <li><a href="../index.html#skills">技艺</a></li>
      <li><a href="../index.html#gallery">图录</a></li>
      <li><a href="articles.html">文章</a></li>
      <li><a href="reading-notes.html">读书笔记</a></li>
      <li><a href="photography.html">摄影</a></li>
      <li><a href="books.html">藏书阁</a></li>
      <li><a href="bingqipu.html" class="active">兵器谱</a></li>
      <li><a href="../index.html#contact">联系</a></li>
    </ul>
  </div>
</nav>

<header class="page-hd">
  <a href="../index.html" class="back-link">返回江湖</a>
  <h1 id="pageTitle">兵器谱</h1>
  <p class="hd-sub" id="pageSub"></p>
  <div class="hd-intro" id="pageIntro"></div>
</header>

<div class="wuxia-divider">◆ ◇ ◆ ◇ ◆</div>

<main class="bingqi-layout">
  <!-- 左侧：编程路线 -->
  <aside class="roadmap-col">
    <div class="roadmap-title">编程路线</div>
    <div class="roadmap" id="roadmap"></div>
  </aside>

  <!-- 右侧：关联书籍 -->
  <section class="book-panel">
    <div class="book-panel-head">
      <div>
        <h2 id="stageName">—</h2>
        <div class="bp-desc" id="stageDesc"></div>
      </div>
      <span class="bp-count" id="bookCount"></span>
    </div>
    <div class="book-grid" id="bookGrid"></div>
  </section>
</main>

<!-- 书籍详情面板 -->
<div class="detail-mask" id="detailMask">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<footer id="siteFooter"></footer>
<script src="footer.js"></script>

<script>
(async () => {
  const roadmapEl = document.getElementById('roadmap');
  const grid      = document.getElementById('bookGrid');
  const stageName = document.getElementById('stageName');
  const stageDesc = document.getElementById('stageDesc');
  const countEl   = document.getElementById('bookCount');
  const mask      = document.getElementById('detailMask');
  const panel     = document.getElementById('detailPanel');
  const esc = (s) => String(s == null ? '' : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  let DATA = null;
  let activeId = null;

  function stars(rating) {
    let h = '';
    for (let i = 1; i <= 5; i++) h += i <= rating ? '★' : '<span class="star-off">★</span>';
    return h;
  }
  function statusClass(s) {
    if (s === '已读') return 'status-read';
    if (s === '在读') return 'status-reading';
    return 'status-wish';
  }
  function coverHTML(b) {
    if (b.cover) return '<img src="' + esc(b.cover) + '" alt="' + esc(b.title) + '">';
    return esc(b.title);
  }

  function renderRoadmap() {
    roadmapEl.innerHTML = DATA.stages.map(st => (
      '<div class="roadmap-node' + (st.id === activeId ? ' active' : '') + '" data-id="' + esc(st.id) + '">' +
        '<div class="rn-name">' + esc(st.name) + '</div>' +
        '<div class="rn-desc">' + esc(st.desc || '') + '</div>' +
      '</div>'
    )).join('');
  }

  function renderBooks() {
    const st = DATA.stages.find(x => x.id === activeId);
    if (!st) return;
    stageName.textContent = st.name;
    stageDesc.textContent = st.desc || '';
    const books = st.books || [];
    countEl.textContent = '共 ' + books.length + ' 册';

    if (books.length === 0) {
      grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--muted);padding:48px 0;">此阶暂未列兵器</p>';
      return;
    }
    grid.innerHTML = books.map(b => {
      const tags = (b.tags || []).map(t => '<span class="book-tag">' + esc(t) + '</span>').join('');
      return (
        '<div class="book-card" data-id="' + esc(b.id) + '">' +
          '<span class="book-cat">' + esc(b.category || '') + '</span>' +
          '<div class="book-cover">' + coverHTML(b) + '</div>' +
          '<div class="book-body">' +
            '<div class="book-title">' + esc(b.title) + '</div>' +
            '<div class="book-author">' + esc(b.author || '') + '</div>' +
            '<div class="book-meta">' +
              '<span class="book-rating">' + stars(b.rating || 0) + '</span>' +
              '<span class="book-status ' + statusClass(b.status) + '">' + esc(b.status) + '</span>' +
            '</div>' +
            '<div class="book-tags">' + tags + '</div>' +
          '</div>' +
        '</div>'
      );
    }).join('');
  }

  function openDetail(b) {
    const tags = (b.tags || []).map(t => '<span class="book-tag">' + esc(t) + '</span>').join(' ');
    const link = b.noteUrl
      ? '<a class="d-link" href="' + esc(b.noteUrl) + '">查看读书笔记 →</a>'
      : '';
    panel.innerHTML =
      '<button class="detail-close" id="detailClose">×</button>' +
      '<h2>' + esc(b.title) + '</h2>' +
      '<div class="d-author">' + esc(b.author || '') + '</div>' +
      '<div class="d-row">' +
        '<span class="book-rating">' + stars(b.rating || 0) + '</span>' +
        '<span class="book-status ' + statusClass(b.status) + '">' + esc(b.status) + '</span>' +
        '<span class="book-tag">' + esc(b.category || '') + '</span>' +
      '</div>' +
      (b.summary ? '<div class="d-summary">' + esc(b.summary) + '</div>' : '') +
      (tags ? '<div class="book-tags" style="margin-bottom:20px;">' + tags + '</div>' : '') +
      link;
    mask.classList.add('open');
    document.getElementById('detailClose').addEventListener('click', closeDetail);
  }
  function closeDetail() { mask.classList.remove('open'); }

  // 事件
  roadmapEl.addEventListener('click', (e) => {
    const node = e.target.closest('.roadmap-node');
    if (!node) return;
    activeId = node.dataset.id;
    renderRoadmap();
    renderBooks();
  });
  grid.addEventListener('click', (e) => {
    const card = e.target.closest('.book-card');
    if (!card) return;
    const st = DATA.stages.find(x => x.id === activeId);
    const b = (st.books || []).find(x => x.id === card.dataset.id);
    if (b) openDetail(b);
  });
  mask.addEventListener('click', (e) => { if (e.target === mask) closeDetail(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });

  // 加载数据
  try {
    const resp = await fetch('bingqipu-data/roadmap.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    DATA = await resp.json();
    document.getElementById('pageTitle').textContent = DATA.title || '兵器谱';
    document.getElementById('pageSub').textContent   = DATA.subtitle || '';
    document.getElementById('pageIntro').textContent = DATA.intro || '';
    activeId = DATA.stages[0].id;
    renderRoadmap();
    renderBooks();
  } catch (err) {
    document.getElementById('pageIntro').textContent =
      '路线图加载失败：请通过本地服务器（如 python -m http.server）访问本页，file:// 下浏览器会拦截 fetch。';
    console.error('roadmap.json fetch failed:', err);
  }
})();
</script>
</body>
