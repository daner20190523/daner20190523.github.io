<!DOCTYPE html>
<html lang="zh-CN" data-theme="wuxia">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藏书阁 — 张单单的技术江湖</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink:         #1a1410;
  --ink-soft:    #3a3028;
  --ink-light:   #6b5e50;
  --paper:       #faf7f0;
  --bg:          #ede8db;
  --accent:      #c43a31;
  --accent-dark: #8b1a12;
  --accent-soft: #fdf2f0;
  --gold:        #b8943e;
  --gold-light:  #d4b860;
  --warm-gray:   #f5efe0;
  --border:      #d9ceb8;
  --muted:       #6b5e4f;
  --shadow:      0 4px 32px rgba(100,60,20,0.08);
  --content-w:   1080px;
  --font-heading: "Noto Serif SC", "KaiTi", "STKaiti", "楷体", "Songti SC", serif;
  --font-body:    "Noto Serif SC", "PingFang SC", "KaiTi", "STKaiti", sans-serif;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  font-size: 16px; line-height: 1.85;
  color: var(--ink); background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 0%, rgba(200,170,120,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 100%, rgba(180,140,80,0.04) 0%, transparent 50%);
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
}

/* Nav */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,247,240,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.nav-inner {
  max-width: var(--content-w); margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.nav-logo {
  font-family: var(--font-heading); font-size: 18px; font-weight: 700;
  letter-spacing: 2px; color: var(--accent); text-decoration: none;
  display: flex; align-items: center; gap: 8px;
}
.nav-logo::before { content: ""; display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.nav-links { display: flex; gap: 24px; list-style: none; }
.nav-links a {
  font-size: 13px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--muted); text-decoration: none; transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--accent); }

/* Page header */
.page-hd {
  max-width: var(--content-w); margin: 0 auto;
  padding: 64px 40px 32px;
  position: relative; z-index: 1;
}
.page-hd .back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--muted); text-decoration: none;
  margin-bottom: 24px; transition: color 0.2s;
}
.page-hd .back-link:hover { color: var(--accent); }
.page-hd .back-link::before { content: "←"; font-size: 14px; }
.page-hd h1 {
  font-family: var(--font-heading);
  font-size: clamp(32px, 5vw, 44px); font-weight: 700;
  color: var(--ink); letter-spacing: -0.5px;
  margin-bottom: 8px;
}
.page-hd .hd-sub {
  font-size: 14px; color: var(--muted);
  letter-spacing: 1px;
}

.wuxia-divider {
  text-align: center; padding: 0 0 16px;
  color: var(--accent); opacity: 0.25; font-size: 20px; letter-spacing: 16px; user-select: none;
}

/* Filter bars */
.filter-bar {
  max-width: var(--content-w); margin: 0 auto;
  padding: 10px 40px 18px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
}
.filter-bar + .filter-bar { padding-top: 0; }
.filter-btn {
  font-family: var(--font-body);
  font-size: 13px; font-weight: 600; letter-spacing: 1px;
  color: var(--muted); background: transparent;
  border: 1px solid var(--border); border-radius: 999px;
  padding: 6px 16px; cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: var(--accent); border-color: var(--accent); color: #fff;
}
.filter-count { font-size: 12px; color: var(--muted); margin-left: auto; letter-spacing: 1px; }

/* Books wrap & category sections */
.books-wrap {
  max-width: var(--content-w); margin: 0 auto;
  padding: 8px 40px 64px;
}
.book-section { margin-bottom: 48px; }
.section-head {
  display: flex; align-items: baseline; gap: 14px;
  margin-bottom: 18px; padding-bottom: 10px;
  border-bottom: 1px dashed var(--border);
}
.section-title {
  position: relative; padding-left: 14px;
  font-family: var(--font-heading); font-size: 22px; font-weight: 700;
  color: var(--ink); letter-spacing: 1px;
}
.section-title::before {
  content: ""; position: absolute; left: 0; top: 5px; bottom: 5px;
  width: 4px; border-radius: 2px; background: var(--accent);
}
.section-count { font-size: 12px; color: var(--muted); letter-spacing: 1px; }
.book-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}
.books-empty { text-align: center; color: var(--muted); padding: 60px 0; }

.book-card {
  position: relative;
  display: flex; gap: 16px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
}
.book-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
  border-color: var(--gold);
}
.book-cover {
  flex: 0 0 76px;
  width: 76px; height: 108px;
  border-radius: 6px;
  background: linear-gradient(135deg, var(--ink-soft), var(--ink));
  color: var(--gold-light);
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  font-family: var(--font-heading);
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  padding: 8px; line-height: 1.4;
  box-shadow: inset 0 0 0 1px rgba(184,148,62,0.25);
  overflow: hidden;
}
.book-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
.book-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.book-title {
  font-family: var(--font-heading); font-size: 17px; font-weight: 700;
  color: var(--ink); line-height: 1.35; margin-bottom: 2px;
}
.book-author { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.book-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.book-rating { color: var(--gold); font-size: 13px; letter-spacing: 1px; }
.book-rating .star-off { color: var(--border); }
.book-status {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  padding: 2px 8px; border-radius: 999px;
}
.status-read   { background: rgba(34,197,94,0.12);  color: #2f8a4a; }
.status-reading{ background: rgba(59,130,246,0.12);  color: #2f6bd0; }
.status-wish   { background: rgba(180,148,62,0.14);  color: #9a7a26; }
.book-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
.book-tag {
  font-size: 11px; color: var(--ink-light);
  background: var(--warm-gray); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 7px; letter-spacing: 0.5px;
}

/* Detail panel */
.detail-mask {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(26,20,16,0.45);
  backdrop-filter: blur(3px);
  display: none; align-items: center; justify-content: center; padding: 24px;
}
.detail-mask.open { display: flex; }
.detail-panel {
  background: var(--paper);
  max-width: 560px; width: 100%;
  border-radius: 14px; padding: 32px;
  position: relative; box-shadow: var(--shadow);
  animation: pop 0.25s ease;
}
@keyframes pop { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
.detail-close {
  position: absolute; top: 16px; right: 18px;
  font-size: 22px; line-height: 1; color: var(--muted); cursor: pointer;
  background: none; border: none;
}
.detail-close:hover { color: var(--accent); }
.detail-panel h2 { font-family: var(--font-heading); font-size: 24px; margin-bottom: 4px; color: var(--ink); }
.detail-panel .d-author { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.detail-panel .d-row { display: flex; gap: 14px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.detail-panel .d-summary { font-size: 14px; line-height: 1.9; color: var(--ink-soft); margin-bottom: 20px; }
.detail-panel .d-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; letter-spacing: 1px;
  color: #fff; background: var(--accent);
  text-decoration: none; padding: 8px 18px; border-radius: 8px;
  transition: background 0.2s;
}
.detail-panel .d-link:hover { background: var(--accent-dark); }

/* Footer */
.footer {
  background: var(--ink);
  padding: 56px 72px 48px;
  color: #b0aca4;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 48px;
}
.footer .footer-left { min-width: 0; }
.footer .refs-label {
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: #5c5850;
  margin-bottom: 18px; display: block;
}
.footer .refs { list-style: none; margin-bottom: 36px; }
.footer .refs li {
  font-size: 12px; line-height: 2; color: #7a756b;
  padding-left: 18px; position: relative; margin-bottom: 4px;
  word-break: break-all;
}
.footer .refs li::before { content: "[·]"; position: absolute; left: 0; color: #4a4540; font-size: 10px; }
.footer .refs li a { color: #7a756b; text-decoration: none; transition: color 0.2s; }
.footer .refs li a:hover { color: var(--gold-light); }
.footer .sig-line { width: 40px; height: 2px; background: #3a3530; margin-bottom: 20px; }
.footer .sig-name { font-family: var(--font-heading); font-size: 22px; font-weight: 700; color: var(--paper); letter-spacing: 2px; margin-bottom: 4px; }
.footer .sig-sub { font-size: 11px; letter-spacing: 1px; color: #5c5850; }
.footer .footer-right { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 10px; }
.footer .qrcode-img { width: 90px; height: 90px; border-radius: 6px; opacity: 0.88; border: 1px solid rgba(180,180,170,0.15); display: block; }
.footer .qrcode-hint { font-size: 10px; letter-spacing: 1.5px; color: #5c5850; }

/* Responsive */
@media (max-width: 900px) {
  .book-grid { grid-template-columns: repeat(2, 1fr); }
  .books-wrap { padding: 8px 24px 56px; }
  .page-hd { padding: 40px 24px 28px; }
  .filter-bar { padding: 10px 24px 16px; }
}
@media (max-width: 480px) {
  .book-grid { grid-template-columns: 1fr; }
  .books-wrap { padding: 8px 16px 48px; }
  .nav-links { gap: 12px; font-size: 11px; }
  .footer { padding: 40px 24px; grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="siteNav"></div>
<script src="nav.js"></script>

<header class="page-hd">
  <a href="../index.html" class="back-link">返回江湖</a>
  <h1>藏书阁</h1>
  <p class="hd-sub">书卷多情似故人，晨昏忧乐每相亲 · 一册一剑，江湖夜雨十年灯</p>
  <p class="hd-sub">【找电子书书可联系博主，无偿分享】</p>
</header>

<div class="wuxia-divider">◆ ◇ ◆ ◇ ◆</div>

<!-- 分类筛选（由 JS 动态生成） -->
<div class="filter-bar" id="catBar"></div>

<!-- 状态筛选 -->
<div class="filter-bar" id="statusBar">
  <button class="filter-btn active" data-status="all">全部</button>
  <button class="filter-btn" data-status="已读">已读</button>
  <button class="filter-btn" data-status="在读">在读</button>
  <button class="filter-btn" data-status="想读">想读</button>
  <span class="filter-count" id="filterCount"></span>
</div>

<main class="books-wrap" id="bookWrap">
  <!-- 由 JS 按分类分组陈列 books-data/books.json -->
</main>

<div class="wuxia-divider">◆ ◇ ◆ ◇ ◆</div>

<!-- 详情面板 -->
<div class="detail-mask" id="detailMask">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<script>
(async () => {
  const wrap      = document.getElementById('bookWrap');
  const catBar    = document.getElementById('catBar');
  const statusBar = document.getElementById('statusBar');
  const countEl   = document.getElementById('filterCount');
  const mask      = document.getElementById('detailMask');
  const panel     = document.getElementById('detailPanel');
  const esc = (s) => String(s == null ? '' : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  // 技术优先的分类展示顺序；未列出的按出现顺序追加到末尾
  const ORDER = ['架构/分布式','Java/JVM','编程','算法','设计/建模','AI',
                 '理财/投资','自我提升','心理/成长','社科/科学','思想/随笔',
                 '文学/小说','其他','未分类'];

  let BOOKS = [];
  let curCat = 'all';
  let curStatus = 'all';

  // 归一化分类：空 -> 未分类；心理/疗愈 并入 心理/成长
  function normCat(c) {
    if (!c || !String(c).trim()) return '未分类';
    if (c === '心理/疗愈') return '心理/成长';
    return c;
  }
  function catKey(c) { const i = ORDER.indexOf(c); return i === -1 ? ORDER.length : i; }

  function stars(rating) {
    let h = '';
    for (let i = 1; i <= 5; i++) h += i <= rating ? '★' : '<span class="star-off">★</span>';
    return h;
  }
  function statusClass(s) {
    if (s === '已读') return 'status-read';
    if (s === '在读') return 'status-reading';
    return 'status-wish';
  }
  function coverHTML(b) {
    if (b.cover) return '<img src="' + esc(b.cover) + '" alt="' + esc(b.title) + '">';
    return esc(b.title);
  }
  function cardHTML(b) {
    const tags = (b.tags || []).map(t => '<span class="book-tag">' + esc(t) + '</span>').join('');
    return '<div class="book-card" data-id="' + esc(b.id) + '">' +
        '<div class="book-cover">' + coverHTML(b) + '</div>' +
        '<div class="book-body">' +
          '<div class="book-title">' + esc(b.title) + '</div>' +
          '<div class="book-author">' + esc(b.author || '') + '</div>' +
          '<div class="book-meta">' +
            '<span class="book-rating">' + stars(b.rating || 0) + '</span>' +
            '<span class="book-status ' + statusClass(b.status) + '">' + esc(b.status) + '</span>' +
          '</div>' +
          '<div class="book-tags">' + tags + '</div>' +
        '</div>' +
      '</div>';
  }

  function allCats() {
    const set = new Set();
    BOOKS.forEach(b => set.add(normCat(b.category)));
    return [...set].sort((a, b) => catKey(a) - catKey(b));
  }

  // 按分类分组渲染；分类 tab / 状态筛选 均生效
  function render() {
    const cats = allCats().filter(c => curCat === 'all' || c === curCat);
    let total = 0, html = '';
    for (const cat of cats) {
      const list = BOOKS.filter(b =>
        normCat(b.category) === cat && (curStatus === 'all' || b.status === curStatus));
      if (!list.length) continue;
      total += list.length;
      html += '<section class="book-section">' +
          '<div class="section-head">' +
            '<h2 class="section-title">' + esc(cat) + '</h2>' +
            '<span class="section-count">' + list.length + ' 册</span>' +
          '</div>' +
          '<div class="book-grid">' + list.map(cardHTML).join('') + '</div>' +
        '</section>';
    }
    wrap.innerHTML = total ? html : '<p class="books-empty">此条件下暂无藏书</p>';
    countEl.textContent = '共 ' + total + ' 册';
  }

  function openDetail(b) {
    const tags = (b.tags || []).map(t => '<span class="book-tag">' + esc(t) + '</span>').join(' ');
    const link = b.noteUrl
      ? '<a class="d-link" href="' + esc(b.noteUrl) + '">查看读书笔记 →</a>'
      : '';
    panel.innerHTML =
      '<button class="detail-close" id="detailClose">×</button>' +
      '<h2>' + esc(b.title) + '</h2>' +
      '<div class="d-author">' + esc(b.author || '') + '</div>' +
      '<div class="d-row">' +
        '<span class="book-rating">' + stars(b.rating || 0) + '</span>' +
        '<span class="book-status ' + statusClass(b.status) + '">' + esc(b.status) + '</span>' +
        '<span class="book-tag">' + esc(normCat(b.category)) + '</span>' +
      '</div>' +
      (b.summary ? '<div class="d-summary">' + esc(b.summary) + '</div>' : '') +
      (tags ? '<div class="book-tags" style="margin-bottom:20px;">' + tags + '</div>' : '') +
      link;
    mask.classList.add('open');
    document.getElementById('detailClose').addEventListener('click', closeDetail);
  }
  function closeDetail() { mask.classList.remove('open'); }

  // 生成分类 tab
  function buildCatBar() {
    const cats = allCats();
    let h = '<button class="filter-btn active" data-cat="all">全部</button>';
    cats.forEach(c => h += '<button class="filter-btn" data-cat="' + esc(c) + '">' + esc(c) + '</button>');
    catBar.innerHTML = h;
  }

  // 事件
  wrap.addEventListener('click', (e) => {
    const card = e.target.closest('.book-card');
    if (!card) return;
    const b = BOOKS.find(x => x.id === card.dataset.id);
    if (b) openDetail(b);
  });
  catBar.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    curCat = btn.dataset.cat;
    catBar.querySelectorAll('.filter-btn').forEach(x => x.classList.toggle('active', x === btn));
    render();
  });
  statusBar.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    curStatus = btn.dataset.status;
    statusBar.querySelectorAll('.filter-btn').forEach(x => x.classList.toggle('active', x === btn));
    render();
  });
  mask.addEventListener('click', (e) => { if (e.target === mask) closeDetail(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });

  // 加载数据
  try {
    const resp = await fetch('books-data/books.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    BOOKS = data.books || [];
    buildCatBar();
    render();
  } catch (err) {
    wrap.innerHTML = '<p class="books-empty">藏书加载失败，请通过本地服务器（如 python -m http.server）访问本页，file:// 下浏览器会拦截 fetch。</p>';
    console.error('books.json fetch failed:', err);
  }
})();
</script>

<footer id="siteFooter"></footer>
<script src="footer.js"></script>
</body>
</html>
