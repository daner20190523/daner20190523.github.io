<!DOCTYPE html>
<html lang="zh-CN" data-theme="wuxia">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武林图录 — 张单单的技术江湖</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink:         #1a1410;
  --ink-soft:    #3a3028;
  --ink-light:   #6b5e50;
  --paper:       #faf7f0;
  --bg:          #ede8db;
  --accent:      #c43a31;
  --accent-dark: #8b1a12;
  --accent-soft: #fdf2f0;
  --gold:        #b8943e;
  --gold-light:  #d4b860;
  --border:      #d9ceb8;
  --muted:       #6b5e4f;
  --shadow:      0 4px 32px rgba(100,60,20,0.08);
  --content-w:   960px;
  --font-heading: "Noto Serif SC", "KaiTi", "STKaiti", "楷体", "Songti SC", serif;
  --font-body:    "Noto Serif SC", "PingFang SC", "KaiTi", "STKaiti", sans-serif;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  font-size: 16px; line-height: 1.85;
  color: var(--ink); background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 0%, rgba(200,170,120,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 100%, rgba(180,140,80,0.04) 0%, transparent 50%);
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
}

/* Nav */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,247,240,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.nav-inner {
  max-width: var(--content-w); margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.nav-logo {
  font-family: var(--font-heading);
  font-size: 18px; font-weight: 700;
  color: var(--ink); letter-spacing: 2px;
  text-decoration: none;
}
.nav-back {
  font-size: 13px; color: var(--ink-light);
  text-decoration: none; letter-spacing: 1px;
  transition: color 0.25s;
}
.nav-back:hover { color: var(--accent); }

/* Hero */
.hero {
  max-width: var(--content-w); margin: 0 auto;
  padding: 60px 24px 36px; text-align: center;
}
.hero h1 {
  font-family: var(--font-heading);
  font-size: 36px; font-weight: 800;
  letter-spacing: 4px; color: var(--ink);
}
.hero .sub {
  margin-top: 10px; font-size: 14px;
  color: var(--muted); letter-spacing: 2px;
}
.hero .dragon {
  display: inline-block; margin-top: 16px;
  color: var(--gold); font-size: 20px; letter-spacing: 8px;
}

/* Section */
.section {
  max-width: var(--content-w); margin: 0 auto 48px;
  padding: 0 24px;
}
.section-title {
  font-family: var(--font-heading);
  font-size: 22px; font-weight: 700;
  letter-spacing: 3px;
  padding-bottom: 12px; margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  color: var(--ink);
  display: flex; align-items: center; gap: 12px;
}
.section-title .tag {
  font-size: 12px; font-weight: 400;
  letter-spacing: 1px;
  background: var(--accent-soft);
  color: var(--accent);
  padding: 2px 10px; border-radius: 2px;
}

/* Gallery Grid */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.gallery-item {
  position: relative; overflow: hidden;
  border: 1px solid var(--border);
  background: var(--paper);
  cursor: pointer;
  aspect-ratio: 3 / 4;
  transition: box-shadow 0.3s;
}
.gallery-item:hover {
  box-shadow: 0 8px 28px rgba(100,60,20,0.12);
}
.gallery-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.4s, filter 0.4s;
}
.gallery-item:hover img {
  transform: scale(1.04);
}
.gallery-item .item-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px 10px;
  background: linear-gradient(transparent, rgba(26,20,16,0.75));
  color: #faf7f0; font-size: 12px;
  font-family: var(--font-heading);
  letter-spacing: 1px;
  opacity: 0; transition: opacity 0.3s;
}
.gallery-item:hover .item-label { opacity: 1; }

/* Lightbox */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(10,8,4,0.92);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  padding: 40px;
}
.lightbox.active { display: flex; }
.lightbox img {
  max-width: 90vw; max-height: 80vh;
  border: 2px solid rgba(180,160,120,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  background: var(--paper);
}
.lightbox .lb-caption {
  color: #d9ceb8; font-family: var(--font-heading);
  font-size: 14px; letter-spacing: 2px;
}
.lightbox .lb-close {
  position: absolute; top: 24px; right: 32px;
  width: 40px; height: 40px;
  border: 1px solid rgba(180,160,120,0.3);
  background: transparent; color: #d9ceb8;
  font-size: 24px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s;
}
.lightbox .lb-close:hover {
  background: var(--accent); border-color: var(--accent);
  color: #fff;
}
.lightbox .lb-prev, .lightbox .lb-next {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 48px; height: 48px;
  border: 1px solid rgba(180,160,120,0.2);
  background: rgba(20,16,10,0.6); color: #d9ceb8;
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s;
}
.lightbox .lb-prev:hover, .lightbox .lb-next:hover {
  background: rgba(30,24,16,0.9);
  border-color: var(--gold);
}
.lightbox .lb-prev { left: 24px; }
.lightbox .lb-next { right: 24px; }

/* Footer */
.footer {
  text-align: center; padding: 48px 24px 40px;
  color: var(--muted); font-size: 13px; letter-spacing: 1px;
}
.footer a {
  color: var(--ink-light); text-decoration: none;
  border-bottom: 1px dashed var(--border);
}
.footer a:hover { color: var(--accent); border-color: var(--accent); }

/* Responsive */
@media (max-width: 760px) {
  .hero { padding: 40px 20px 24px; }
  .hero h1 { font-size: 26px; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .section { padding: 0 16px; }
  .lightbox { padding: 20px; }
  .lightbox .lb-prev { left: 8px; }
  .lightbox .lb-next { right: 8px; }
}
@media (max-width: 400px) {
  .gallery-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-inner">
    <a href="gallery.html" class="nav-logo">武林图录</a>
    <a href="../index.html" class="nav-back">← 返回江湖</a>
  </div>
</nav>

<!-- Hero -->
<div class="hero">
  <h1>武林图录</h1>
  <p class="sub">一卷江湖 · 丹青尽收</p>
  <div class="dragon">◆ ◇ ◆ ◇ ◆</div>
</div>

<!-- Gallery Container: dynamically rendered from images.json -->
<div id="gallery-container">
  <div class="section" style="text-align:center;padding:60px 24px;color:var(--muted);font-family:var(--font-heading);letter-spacing:2px;">
    图录加载中……
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <a href="../index.html">← 返回江湖</a>
  &nbsp;·&nbsp;
  <a href="articles.html">全部文章</a>
  <br><br>
  张单单的技术江湖 © 2026
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">&times;</button>
  <button class="lb-prev" id="lbPrev">&#10094;</button>
  <button class="lb-next" id="lbNext">&#10095;</button>
  <img src="" alt="" id="lbImg">
  <div class="lb-caption" id="lbCaption"></div>
</div>

<script>
(function() {
  var container = document.getElementById('gallery-container');
  var basePath = '../images/';
  var manifestUrl = basePath + 'images.json';

  // Lightbox
  var lb = document.getElementById('lightbox');
  var lbImg = document.getElementById('lbImg');
  var lbCaption = document.getElementById('lbCaption');
  var items = [];
  var current = -1;

  function show(i) {
    current = i;
    var el = items[i];
    lbImg.src = el.dataset.src;
    lbCaption.textContent = el.dataset.caption;
    lb.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lb.classList.remove('active');
    document.body.style.overflow = '';
  }

  function prev() {
    var i = (current - 1 + items.length) % items.length;
    show(i);
  }

  function next() {
    var i = (current + 1) % items.length;
    show(i);
  }

  function bindLightbox() {
    items = document.querySelectorAll('.gallery-item');
    items.forEach(function(el, i) {
      el.addEventListener('click', function() { show(i); });
    });
  }

  document.getElementById('lbClose').addEventListener('click', close);
  document.getElementById('lbPrev').addEventListener('click', prev);
  document.getElementById('lbNext').addEventListener('click', next);
  lb.addEventListener('click', function(e) {
    if (e.target === lb) close();
  });
  document.addEventListener('keydown', function(e) {
    if (!lb.classList.contains('active')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'ArrowRight') next();
  });

  // Build gallery item HTML
  function buildItem(cat, img) {
    var caption = cat + ' · ' + img.label;
    return '<div class="gallery-item" data-src="' + basePath + img.file + '" data-caption="' + caption + '">' +
      '<img src="' + basePath + img.file + '" alt="' + caption + '" loading="lazy">' +
      '<div class="item-label">' + img.label + '</div>' +
    '</div>';
  }

  // Build section HTML
  function buildSection(cat) {
    var itemsHtml = cat.images.map(function(img) {
      return buildItem(cat.title, img);
    }).join('');

    return '<section class="section" id="' + cat.id + '">' +
      '<h2 class="section-title">' +
        cat.title +
        '<span class="tag">' + cat.tag + '</span>' +
      '</h2>' +
      '<div class="gallery-grid">' + itemsHtml + '</div>' +
    '</section>';
  }

  // Fetch manifest and render
  fetch(manifestUrl)
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) {
      var html = '';
      var total = 0;
      data.categories.forEach(function(cat) {
        html += buildSection(cat);
        total += cat.images.length;
      });
      container.innerHTML = html;
      bindLightbox();
      console.log('武林图录：加载 ' + data.categories.length + ' 个分类，共 ' + total + ' 张图');
    })
    .catch(function(err) {
      container.innerHTML = '<div class="section" style="text-align:center;padding:60px 24px;color:var(--accent);font-family:var(--font-heading);letter-spacing:2px;">' +
        '图录加载失败：' + err.message + '<br><small style="color:var(--muted)">请确认 images.json 文件存在</small>' +
      '</div>';
      console.error('武林图录加载失败:', err);
    });
})();
</script>
</body>
</html>
